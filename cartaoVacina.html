<!DOCTYPE html>
<html>
<head>
	<title>Cartão de Vacinação</title>
	<link rel="stylesheet" href="style.css">
	<script src="scriptcart.js"></script>

<body>
	<button onclick="location.reload()" id="reload-button">

			<h2>1ª Dose</h2>
			<p>Vacina: V10 ou V8</p>
			<p>Data: 06/06/2023</p>
			<p>Faltam: <span id="dose1"></span> dias</p>
		</div>
		<div class="vaccine-dose">
			<h2>2ª Dose</h2>
			<p>Vacina: V10 ou V8</p>
			<p>Data: 27/06/2023</p>
			<p>Faltam: <span id="dose2"></span> dias</p>
		</div>
		<div class="vaccine-dose">
			<h2>3ª Dose + Antirrábica</h2>
			<p>Vacina: V10 ou V8 + dose única da antirrábica</p>
			<p>Data: 27/07/2023</p>
			<p>Faltam: <span id="dose3"></span> dias</p>
		</div>
        <a href="index.html"><button>Ir para página inicial</button></a>
